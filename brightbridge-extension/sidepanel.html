<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrightBridge</title>
  <link rel="stylesheet" href="sidepanel.css"/>
</head>
<body>
  <div id="app">

    <!-- ── Home ── -->
    <div id="homeView" class="tool-view">
      <header class="home-header">
        <div class="header-left">
          <span class="logo">🎓</span>
          <div class="header-text">
            <span class="app-name">BrightBridge</span>
            <span class="class-label">Teacher Tools</span>
          </div>
        </div>
        <button type="button" class="dark-toggle js-dark-toggle" title="Toggle dark mode">🌙</button>
      </header>
      <div class="home-grid">
        <div class="home-tool-section home-tool-section--live">
          <button type="button" class="home-tool-card btn home-tool-card--live" data-tool="phoneLogs">Phone logs</button>
          <button type="button" class="home-tool-card btn home-tool-card--live" data-tool="printTemplates">Print Templates</button>
          <button type="button" class="home-tool-card btn home-tool-card--live" data-tool="report">Report Card Generator</button>
        </div>
        <div class="home-tool-section home-tool-section--soon">
          <h2 class="home-soon-heading">Coming soon</h2>
          <button type="button" class="home-tool-card btn home-tool-card--soon" data-tool="advancedClassData">Advanced Class Data</button>
          <button type="button" class="home-tool-card btn home-tool-card--soon" data-tool="drillAverages">Drill Averages</button>
          <button type="button" class="home-tool-card btn home-tool-card--soon" data-tool="transferMarks">Transfer students marks</button>
        </div>
      </div>
    </div>

    <!-- ── Report Card Generator (existing UI) ── -->
    <div id="reportView" class="tool-view view--hidden">
      <header id="reportHeader" class="tool-panel-header">
        <button type="button" class="btn back-btn" id="backFromReportBtn" title="Back to home">←</button>
        <div class="header-left">
          <span class="logo">🎓</span>
          <div class="header-text">
            <span class="app-name">BrightBridge</span>
            <span id="classLabel" class="class-label">Spirit of Math</span>
          </div>
        </div>
        <button type="button" class="dark-toggle js-dark-toggle" title="Toggle dark mode">🌙</button>
        <button class="btn icon-btn" id="refreshBtn" title="Re-load grades from this page">↻</button>
      </header>

      <div class="mode-tabs">
        <button class="mode-tab active" id="modeBulkBtn" type="button">Bulk</button>
        <button class="mode-tab" id="modeSingleBtn" type="button">Single Student</button>
      </div>

      <div id="statusBar" class="status-bar status-idle">
        <span id="statusText">Open a tool from the home menu.</span>
      </div>

      <div id="bulkPanel">
        <div id="controls" class="controls" style="display:none">
          <div class="control-row">
            <label>Term</label>
            <select id="termSelect">
              <option value="Term 1">Term 1</option>
              <option value="Term 2">Term 2</option>
              <option value="Term 3">Term 3</option>
            </select>
          </div>
          <div class="control-row">
            <label>Grade Grp</label>
            <select id="gradeGroupSelect">
              <option value="sk_gr2">SK – Gr 2</option>
              <option value="gr3_gr4">Gr 3 – Gr 4</option>
              <option value="gr5_gr8" selected>Gr 5 – Gr 8</option>
              <option value="gr9_gr11">Gr 9 – Gr 11</option>
            </select>
          </div>
          <div class="control-row">
            <label>Structure</label>
            <select id="structureSelect">
              <option value="sandwich_paragraph">Sandwich Paragraph</option>
              <option value="strengths_feedback_blocks">Strengths / Feedback</option>
              <option value="bullet_points">Bullet Points</option>
            </select>
          </div>
          <div class="control-row filter-row">
            <button class="btn filter-btn" id="filterUnderperformingBtn" type="button">⚠️ Show Underperforming</button>
            <span id="studentCount" class="student-count"></span>
          </div>
          <button class="btn primary generate-all-btn" id="generateAllBtn" type="button">▶ Generate All Comments</button>
        </div>
        <div id="studentList" class="student-list"></div>
        <div id="emptyState" class="empty-state" style="display:none">
          <p class="empty-icon">📊</p>
          <p>Open your Brightspace <strong>Grades</strong> page,<br/>then click <strong>↻</strong> to load students.</p>
        </div>
      </div>

      <div id="singlePanel" style="display:none">
        <div id="singleContent" class="single-content"></div>
      </div>
    </div>

    <!-- ── Phone logs ── -->
    <div id="phoneLogsView" class="tool-view view--hidden">
      <header class="tool-panel-header">
        <button type="button" class="btn back-btn" id="backFromPhoneLogsBtn" title="Back to home">←</button>
        <div class="header-left">
          <span class="logo">📞</span>
          <div class="header-text">
            <span class="app-name">Phone logs</span>
            <span class="class-label">From gradebook</span>
          </div>
        </div>
        <button type="button" class="dark-toggle js-dark-toggle" title="Toggle dark mode">🌙</button>
        <button class="btn icon-btn" id="phoneLogsRefreshBtn" title="Re-load grades from page">↻</button>
      </header>
      <div id="phoneLogsStatus" class="status-bar status-idle"><span id="phoneLogsStatusText">Loading…</span></div>
      <div id="phoneLogsRoot" class="phone-logs-root"></div>
    </div>

    <!-- ── Print templates ── -->
    <div id="printTemplatesView" class="tool-view view--hidden">
      <header class="tool-panel-header">
        <button type="button" class="btn back-btn" id="backFromPrintBtn" title="Back to home">←</button>
        <div class="header-left">
          <span class="logo">🖨</span>
          <div class="header-text">
            <span class="app-name">Print Templates</span>
            <span id="printTemplateClassHint" class="class-label">Gradebook</span>
          </div>
        </div>
        <button type="button" class="dark-toggle js-dark-toggle" title="Toggle dark mode">🌙</button>
      </header>
      <div id="printTemplatesStatus" class="status-bar status-idle"><span id="printTemplatesStatusText"></span></div>
      <div id="printTemplatesRoot" class="print-templates-root"></div>
    </div>

    <!-- ── Placeholder tools ── -->
    <div id="placeholderView" class="tool-view view--hidden">
      <header class="tool-panel-header">
        <button type="button" class="btn back-btn" id="backFromPlaceholderBtn" title="Back to home">←</button>
        <div class="header-left">
          <span class="logo">🎓</span>
          <div class="header-text">
            <span class="app-name" id="placeholderTitle">Coming soon</span>
          </div>
        </div>
        <button type="button" class="dark-toggle js-dark-toggle" title="Toggle dark mode">🌙</button>
      </header>
      <div class="placeholder-body">
        <p id="placeholderBody">This tool is not available yet.</p>
      </div>
    </div>

  </div>

  <iframe id="printFrame" class="print-frame" title="Print"></iframe>

  <script src="print-templates.js"></script>
  <script src="phone-logs.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
